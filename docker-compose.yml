services:
  # APP
  app:
    build:
      context: .docker
      dockerfile: Dockerfile
    image: seeablemvp-php-fpm:latest
    container_name: app
    restart: unless-stopped
    tty: true
    ports:
      - 80:80
      - 5173:5173
    volumes:
      - ./:/var/www/html
      - ./.docker/php.ini:/usr/local/etc/php/conf.d/99-php.ini
      - ./.docker/xdebug.ini:/usr/local/etc/php/conf.d/20-xdebug.ini
      - ./.docker/fpm-pool.conf:/usr/local/etc/php-fpm.conf
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./.docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
      - ~/.ssh:/home/laravel/.ssh
    cap_add:
      - SYS_ADMIN
    environment:
      - XDEBUG_SESSION=${XDEBUG_SESSION:-0}
      - XDEBUG_CONFIG=${XDEBUG_CONFIG:-client_host=host.docker.internal}
    networks:
      - default-network

# Networks
networks:
  default-network:
